name: Deepity Multi-Platform CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Testing Ubuntu, Windows, and an Intel-based Mac (to bypass the arm64 immintrin.h issue)
        os: [ubuntu-latest, windows-latest, macos-13]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libopenblas-dev \
          liblapack-dev \
          libomp-dev \
          python3-dev \
          pybind11-dev \
          ninja-build

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install openblas libomp pybind11 ninja

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        # Use vcpkg to install the BLAS, Python bindings, and the OpenMP runtime required by the C++ code.
        vcpkg install openblas:x64-windows pybind11:x64-windows libomp:x64-windows

    - name: Configure CMake
      run: |
        # macOS specific configuration logic
        if [ "$RUNNER_OS" == "macOS" ]; then
          export CMAKE_PREFIX_PATH="$(brew --prefix libomp):$CMAKE_PREFIX_PATH"
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          
        # Windows specific configuration logic (integrating vcpkg toolchain)
        elif [ "$RUNNER_OS" == "Windows" ]; then
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
          
        # Linux standard configuration
        else
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
        fi
      shell: bash

    - name: Build
      run: cmake --build build --config ${{env.BUILD_TYPE}}

    - name: Run benchmark
      run: |
        # Calculate core count across Linux, macOS, and Windows
        if [ "$RUNNER_OS" == "Windows" ]; then
          export OMP_NUM_THREADS=$NUMBER_OF_PROCESSORS
        else
          export OMP_NUM_THREADS=$(nproc 2>/dev/null || sysctl -n hw.ncpu)
        fi
        export OPENBLAS_NUM_THREADS=$OMP_NUM_THREADS
        
        # Windows builds multi-config by default, executable sits in /Release/
        if [ "$RUNNER_OS" == "Windows" ]; then
          ./build/bin/Release/DeepityTests.exe
        else
          export OMP_PROC_BIND=close
          export OMP_PLACES=cores
          ./build/bin/DeepityTests
        fi
      shell: bash

    - name: Test (CTest)
      working-directory: build
      run: ctest --output-on-failure -C ${{env.BUILD_TYPE}}